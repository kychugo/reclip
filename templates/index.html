<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReClip — Free Media Downloader</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --fg: #3a3a38;
      --accent: #e85d2a;
      --accent-hover: #d04e1f;
      --muted: #9c9889;
      --card: #fff;
      --card-border: #e2ded6;
      --success: #2d8a4e;
      --error: #c43d3d;
      --radius: 14px;
      --shimmer: linear-gradient(90deg, #ebe8e2 25%, #f0ede7 50%, #ebe8e2 75%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    .page {
      max-width: 620px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .brand { margin-bottom: 48px; }
    .brand h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 4.2rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
    }
    .brand h1 em { font-style: italic; color: var(--accent); }
    .brand p {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      outline: none;
      resize: none;
      min-height: 56px;
      transition: border-color 0.25s, box-shadow 0.25s;
      margin-bottom: 6px;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 93, 42, 0.08);
    }
    textarea::placeholder { color: var(--muted); }

    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
      align-items: center;
    }
    .pill-group {
      display: flex;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }
    .pill {
      padding: 9px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .pill.active { background: var(--fg); color: var(--bg); }
    .pill:not(.active):hover { color: var(--fg); }

    .fetch-btn {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .fetch-btn:hover { background: var(--accent-hover); }
    .fetch-btn:active { transform: scale(0.98); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Cards */
    .cards { margin-top: 24px; }

    .card {
      display: flex;
      gap: 14px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 14px;
      margin-bottom: 10px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      width: 120px;
      min-width: 120px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-border);
      flex-shrink: 0;
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* No-thumbnail icon */
    .card-thumb .no-thumb {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .card-thumb .no-thumb svg {
      width: 28px;
      height: 28px;
      opacity: 0.5;
    }

    /* Shimmer skeleton for loading state */
    .card-thumb.loading {
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 6px;
    }
    .skeleton-line.short { width: 40%; height: 10px; }
    .skeleton-line.medium { width: 75%; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1rem;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-dl-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 7px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .card-dl-btn:hover { background: #2d2d2a; }
    .card-dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .card-dl-btn.done { background: var(--success); color: #fff; }
    .card-dl-btn.error { background: var(--error); color: #fff; }

    .card-status {
      font-size: 0.68rem;
      color: var(--muted);
    }
    .card-status.downloading { color: var(--accent); }
    .card-status.done { color: var(--success); }
    .card-status.error { color: var(--error); }

    .q-chip {
      padding: 4px 10px;
      border: 1.5px solid var(--card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .q-chip.active {
      border-color: var(--fg);
      color: var(--fg);
      background: rgba(26,26,24,0.04);
    }
    .q-chip:hover:not(.active) { border-color: var(--muted); }

    /* Error card */
    .card.card-error {
      border-color: rgba(196, 61, 61, 0.2);
      background: rgba(196, 61, 61, 0.03);
    }
    .card-error-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(196, 61, 61, 0.08);
      color: var(--error);
    }
    .card-error-icon svg {
      width: 24px;
      height: 24px;
    }
    .card-error-msg {
      font-size: 0.72rem;
      color: var(--error);
      margin-top: 2px;
      line-height: 1.4;
    }
    .card-error-url {
      font-size: 0.65rem;
      color: var(--muted);
      word-break: break-all;
      margin-top: 4px;
    }

    /* Download all bar */
    .dl-all-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .dl-all-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .dl-all-btn:hover { background: #2d2d2a; }
    .dl-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.8;
    }

    /* Mobile */
    @media (max-width: 500px) {
      .brand h1 { font-size: 3rem; }
      .page { padding: 40px 16px 60px; }
      .card { flex-direction: column; gap: 10px; }
      .card-thumb {
        width: 100%;
        min-width: unset;
        height: 160px;
      }
      .card-title { white-space: normal; }
      .controls { flex-wrap: wrap; }
      .fetch-btn { width: 100%; }
    }

    /* ── Preview button ── */
    .card-preview-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--card-border);
      border-radius: 7px;
      background: transparent;
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .card-preview-btn:hover { border-color: var(--fg); background: rgba(26,26,24,0.04); }
    .card-preview-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Preview modal overlay ── */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .preview-container {
      width: 100%;
      max-width: 900px;
      background: #1a1a18;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 92vh;
    }
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .preview-title-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-close-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      padding: 5px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .preview-close-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

    .preview-video-wrap {
      position: relative;
      background: #000;
      cursor: pointer;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #preview-video {
      max-width: 100%;
      max-height: 60vh;
      width: 100%;
      display: block;
      pointer-events: none;
    }
    .preview-play-flash {
      position: absolute;
      pointer-events: none;
      color: rgba(255,255,255,0.85);
      opacity: 0;
    }
    .preview-play-flash.flash-anim {
      animation: flashFade 0.55s ease-out forwards;
    }
    @keyframes flashFade {
      0%   { opacity: 1; transform: scale(1);   }
      100% { opacity: 0; transform: scale(1.6); }
    }
    .preview-loading-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
    }

    /* ── Controls ── */
    .preview-controls {
      padding: 6px 12px 10px;
      background: #1a1a18;
      flex-shrink: 0;
      user-select: none;
    }
    .preview-progress-wrap {
      position: relative;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      touch-action: none;
    }
    .preview-progress-bg {
      position: relative;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      transition: height 0.15s;
    }
    .preview-progress-wrap:hover .preview-progress-bg { height: 6px; }
    .preview-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
    }
    .preview-progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 13px;
      height: 13px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      left: 0%;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .preview-progress-wrap:hover .preview-progress-thumb { opacity: 1; }

    .preview-controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
      gap: 6px;
    }
    .preview-controls-left,
    .preview-controls-right {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .preview-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      min-height: 36px;
      transition: color 0.15s, background 0.15s;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
    }
    .preview-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .preview-btn:active { background: rgba(255,255,255,0.14); }

    .preview-time {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.45);
      margin: 0 4px;
      white-space: nowrap;
    }
    .preview-vol-wrap {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .preview-vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 68px;
      height: 4px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .preview-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    .preview-vol-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
    }
    .preview-speed-select {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: rgba(255,255,255,0.7);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      padding: 4px 6px;
      cursor: pointer;
      outline: none;
      transition: background 0.15s;
    }
    .preview-speed-select:hover { background: rgba(255,255,255,0.12); }
    .preview-speed-select option { background: #1a1a18; color: #fff; }

    @media (max-width: 500px) {
      .preview-vol-slider { width: 48px; }
      .preview-time { font-size: 0.6rem; }
      #preview-video { max-height: 42vh; }
      .preview-controls-right { gap: 0; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <h1>Re<em>Clip</em></h1>
      <p>Free media downloader</p>
    </div>

    <textarea id="urls" placeholder="Paste one or more URLs..." rows="2"></textarea>
    <p class="hint">Multiple links? Separate with spaces, commas, or newlines.</p>

    <div class="controls">
      <div class="pill-group">
        <button class="pill active" data-format="video" onclick="setFormat(this)">MP4</button>
        <button class="pill" data-format="audio" onclick="setFormat(this)">MP3</button>
      </div>
      <button class="fetch-btn" id="goBtn" onclick="go()">Fetch</button>
    </div>

    <div id="cards" class="cards"></div>

    <div class="footer">
      YouTube &middot; TikTok &middot; Instagram &middot; Twitter/X &middot; Reddit &middot; Facebook<br>
      Vimeo &middot; Twitch &middot; Dailymotion &middot; SoundCloud &middot; Loom &middot; Streamable<br>
      Pinterest &middot; Tumblr &middot; Threads &middot; LinkedIn &middot; 1000+ more
    </div>
  </div>

  <!-- ── Video Preview Modal ── -->
  <div id="preview-modal" class="preview-overlay" style="display:none" onclick="closePreview()" role="dialog" aria-modal="true" aria-label="Video preview">
    <div class="preview-container" onclick="event.stopPropagation()">

      <div class="preview-header">
        <span class="preview-title-text" id="preview-title-text"></span>
        <button class="preview-close-btn" onclick="closePreview()" title="Close (Esc)" aria-label="Close preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="preview-video-wrap" id="preview-video-wrap" onclick="togglePlay()" aria-label="Click to play/pause">
        <video id="preview-video" preload="metadata"></video>
        <audio id="preview-audio" preload="metadata" style="display:none"></audio>
        <div class="preview-play-flash" id="preview-play-flash"></div>
        <div class="preview-loading-overlay" id="preview-loading">
          <div class="spin" style="width:36px;height:36px;border-width:3px;color:#fff"></div>
        </div>
      </div>

      <div class="preview-controls">
        <div class="preview-progress-wrap" id="preview-progress-wrap"
             onclick="progressClick(event)"
             ontouchstart="progressTouchStart(event)"
             ontouchmove="progressTouchMove(event)"
             ontouchend="progressTouchEnd(event)"
             role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="preview-progress-bg">
            <div class="preview-progress-fill" id="preview-progress-fill"></div>
            <div class="preview-progress-thumb" id="preview-progress-thumb"></div>
          </div>
        </div>

        <div class="preview-controls-row">
          <div class="preview-controls-left">
            <button class="preview-btn" onclick="seekRel(-10)" title="Back 10s (←)" aria-label="Rewind 10 seconds">−10s</button>
            <button class="preview-btn" id="preview-play-btn" onclick="togglePlay()" title="Play / Pause (Space)" aria-label="Play/Pause">
              <svg id="play-icon"  viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" width="22" height="22" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="preview-btn" onclick="seekRel(10)" title="Forward 10s (→)" aria-label="Forward 10 seconds">+10s</button>
            <span class="preview-time" id="preview-time-display">0:00 / 0:00</span>
          </div>

          <div class="preview-controls-right">
            <div class="preview-vol-wrap">
              <button class="preview-btn" id="preview-mute-btn" onclick="toggleMute()" title="Mute / Unmute (M)" aria-label="Toggle mute">
                <svg id="vol-on-icon"  viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <svg id="vol-off-icon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
              </button>
              <input type="range" class="preview-vol-slider" id="preview-vol-slider"
                     min="0" max="1" step="0.05" value="1"
                     oninput="setVolume(this.value)" aria-label="Volume">
            </div>
            <select class="preview-speed-select" id="preview-speed-select"
                    onchange="setSpeed(this.value)" aria-label="Playback speed">
              <option value="0.5">0.5×</option>
              <option value="0.75">0.75×</option>
              <option value="1" selected>1×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
              <option value="2">2×</option>
            </select>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let currentFormat = 'video';
    let cardData = [];

    function setFormat(btn) {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.format;
    }

    function parseUrls(text) {
      return [...new Set(text.split(/[\s,]+/).map(u => u.trim()).filter(u => u.startsWith('http')))];
    }

    function fmtDur(s) {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function friendlyError(err) {
      if (err.includes('Unsupported URL')) return 'This URL is not supported';
      if (err.includes('Video unavailable')) return 'Video is unavailable or private';
      if (err.includes('Private video')) return 'This video is private';
      if (err.includes('HTTP Error 403')) return 'Access denied by the platform';
      if (err.includes('HTTP Error 404')) return 'Video not found';
      if (err.includes('copyright')) return 'Video blocked due to copyright';
      if (err.includes('geo')) return 'Video not available in your region';
      if (err.includes('timed out') || err.includes('Timed out')) return 'Request timed out — try again';
      if (err.includes('network') || err.includes('Network')) return 'Network error — check your connection';
      return err.length > 80 ? err.slice(0, 80) + '...' : err;
    }

    document.getElementById('urls').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
    });

    async function go() {
      const urls = parseUrls(document.getElementById('urls').value);
      if (!urls.length) return;

      const btn = document.getElementById('goBtn');
      const container = document.getElementById('cards');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      container.innerHTML = '';
      cardData = [];

      for (let i = 0; i < urls.length; i++) {
        const url = urls[i];
        const idx = cardData.length;
        cardData.push({ url, status: 'loading' });
        renderCard(idx);

        try {
          const res = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (data.error) {
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
          } else {
            cardData[idx] = {
              ...cardData[idx],
              status: 'ready',
              title: data.title || '',
              thumbnail: data.thumbnail || '',
              duration: data.duration,
              uploader: data.uploader || '',
              formats: data.formats || [],
              selectedFormatId: data.formats?.[0]?.id || null,
            };
          }
        } catch (err) {
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: err.message };
        }
        renderCard(idx);
      }

      if (cardData.filter(c => c.status === 'ready').length > 1) {
        renderDownloadAll();
      }

      btn.disabled = false;
      btn.textContent = 'Fetch';
    }

    function renderCard(idx) {
      const c = cardData[idx];
      let el = document.getElementById(`card-${idx}`);
      if (!el) {
        el = document.createElement('div');
        el.id = `card-${idx}`;
        el.className = 'card';
        document.getElementById('cards').appendChild(el);
      }

      // Loading skeleton
      if (c.status === 'loading') {
        el.className = 'card';
        el.innerHTML = `
          <div class="card-thumb loading"></div>
          <div class="card-body">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
          </div>
        `;
        return;
      }

      // Error state
      if (c.status === 'info-error') {
        el.className = 'card card-error';
        el.innerHTML = `
          <div class="card-thumb">
            <div class="card-error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title" style="color:var(--error)">Could not fetch video</div>
            <div class="card-error-msg">${esc(friendlyError(c.error || ''))}</div>
            <div class="card-error-url">${esc(c.url)}</div>
          </div>
        `;
        return;
      }

      // Ready / downloading / done / error states
      el.className = 'card';
      const isAudio = currentFormat === 'audio';

      let thumbHtml;
      if (isAudio) {
        thumbHtml = `<div class="no-thumb" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
      } else if (c.thumbnail) {
        thumbHtml = `<img src="${c.thumbnail}" alt="">`;
      } else {
        thumbHtml = `<div class="no-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8" cy="8" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
      }

      let qualityChips = '';
      if (!isAudio && c.formats && c.formats.length > 1) {
        qualityChips = c.formats.map(f =>
          `<button class="q-chip${f.id === c.selectedFormatId ? ' active' : ''}" onclick="pickFormat(${idx}, '${f.id}')">${f.label}</button>`
        ).join('');
      }

      let actionHtml = '';
      if (c.status === 'ready') {
        const previewBtn = !isAudio
          ? `<button class="card-preview-btn" onclick="openPreview(${idx})"><svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><polygon points="5 3 19 12 5 21 5 3"/></svg>Preview</button>`
          : '';
        actionHtml = `${previewBtn}<button class="card-dl-btn" onclick="dlCard(${idx})">Download</button>${qualityChips}`;
      } else if (c.status === 'downloading') {
        actionHtml = `<span class="card-status downloading"><span class="spin"></span> Downloading...</span>`;
      } else if (c.status === 'done') {
        actionHtml = `<button class="card-dl-btn done" onclick="saveCard(${idx})">Save</button>
          <span class="card-status done">${esc(c.filename || '')}</span>`;
      } else if (c.status === 'error') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Retry</button>
          <span class="card-status error">${esc(friendlyError(c.error || 'Download failed'))}</span>`;
      }

      el.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-title">${esc(c.title || 'Untitled')}</div>
          <div class="card-meta">${esc(c.uploader)}${c.duration ? ' · ' + fmtDur(c.duration) : ''}</div>
          <div class="card-actions">${actionHtml}</div>
        </div>
      `;
    }

    function renderDownloadAll() {
      const existing = document.getElementById('dl-all-bar');
      if (existing) existing.remove();

      const bar = document.createElement('div');
      bar.id = 'dl-all-bar';
      bar.className = 'dl-all-bar';
      bar.innerHTML = `<button class="dl-all-btn" onclick="dlAll()">Download All</button>`;
      document.getElementById('cards').appendChild(bar);
    }

    function pickFormat(idx, formatId) {
      cardData[idx].selectedFormatId = formatId;
      renderCard(idx);
    }

    async function dlCard(idx) {
      const c = cardData[idx];
      c.status = 'downloading';
      c.error = null;
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: c.selectedFormatId,
            title: c.title || '',
          }),
        });
        const data = await res.json();
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    function pollCard(idx) {
      const c = cardData[idx];
      const iv = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${c.jobId}`);
          const data = await res.json();
          if (data.status === 'done') {
            clearInterval(iv);
            c.status = 'done';
            c.filename = data.filename;
            renderCard(idx);
            saveCard(idx);
          } else if (data.status === 'error') {
            clearInterval(iv);
            c.status = 'error';
            c.error = data.error;
            renderCard(idx);
          }
        } catch {
          clearInterval(iv);
          c.status = 'error';
          c.error = 'Lost connection to server';
          renderCard(idx);
        }
      }, 1000);
    }

    function saveCard(idx) {
      const c = cardData[idx];
      if (!c.jobId) return;
      const a = document.createElement('a');
      a.href = `/api/file/${c.jobId}`;
      a.download = c.filename || '';
      a.click();
    }

    async function dlAll() {
      const btn = document.querySelector('.dl-all-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Downloading...'; }

      for (let i = 0; i < cardData.length; i++) {
        if (cardData[i].status === 'ready') {
          await dlCard(i);
        }
      }

      if (btn) { btn.disabled = false; btn.textContent = 'Download All'; }
    }

    // ── Video Preview ──────────────────────────────────────────────────────────
    let _previewHasAudio = false;
    let _seekDragging = false;

    function openPreview(idx) {
      const c = cardData[idx];
      const btn = document.querySelector(`#card-${idx} .card-preview-btn`);
      if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }

      fetch('/api/preview-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: c.url }),
      })
        .then(r => r.json())
        .then(data => {
          if (btn) { btn.disabled = false; btn.innerHTML = '<svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><polygon points="5 3 19 12 5 21 5 3"/></svg>Preview'; }
          if (data.error) { alert('Preview unavailable: ' + friendlyError(data.error)); return; }
          _showPreviewModal(c.title || 'Preview', data.token, !!data.has_audio);
        })
        .catch(err => {
          if (btn) { btn.disabled = false; btn.innerHTML = '<svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><polygon points="5 3 19 12 5 21 5 3"/></svg>Preview'; }
          alert('Preview failed: ' + err.message);
        });
    }

    function _showPreviewModal(title, token, hasAudio) {
      _previewHasAudio = hasAudio;
      const vid = document.getElementById('preview-video');
      const aud = document.getElementById('preview-audio');

      document.getElementById('preview-title-text').textContent = title;
      document.getElementById('preview-progress-fill').style.width = '0%';
      document.getElementById('preview-progress-thumb').style.left = '0%';
      document.getElementById('preview-time-display').textContent = '0:00 / 0:00';
      document.getElementById('preview-speed-select').value = '1';
      document.getElementById('preview-vol-slider').value = '1';
      _updatePlayIcon(false);
      _updateVolIcon(false);

      vid.src = `/api/stream/${token}`;
      vid.playbackRate = 1;

      if (hasAudio) {
        vid.muted = true;
        aud.src = `/api/stream/${token}?type=audio`;
        aud.volume = 1;
        aud.muted = false;
        aud.playbackRate = 1;
      } else {
        vid.muted = false;
        vid.volume = 1;
        aud.src = '';
      }

      document.getElementById('preview-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
      document.getElementById('preview-loading').style.display = 'flex';

      vid.play().then(() => {
        if (hasAudio) aud.play().catch(() => {});
      }).catch(() => {});
    }

    function closePreview() {
      const vid = document.getElementById('preview-video');
      const aud = document.getElementById('preview-audio');
      vid.pause(); vid.src = '';
      aud.pause(); aud.src = '';
      document.getElementById('preview-modal').style.display = 'none';
      document.body.style.overflow = '';
    }

    function togglePlay() {
      const vid = document.getElementById('preview-video');
      const aud = document.getElementById('preview-audio');
      if (vid.paused) {
        vid.play();
        if (_previewHasAudio) aud.play().catch(() => {});
        _showPlayFlash(false);
      } else {
        vid.pause();
        if (_previewHasAudio) aud.pause();
        _showPlayFlash(true);
      }
    }

    function seekRel(delta) {
      const vid = document.getElementById('preview-video');
      const aud = document.getElementById('preview-audio');
      const t = Math.max(0, Math.min(vid.currentTime + delta, vid.duration || 0));
      vid.currentTime = t;
      if (_previewHasAudio) aud.currentTime = t;
    }

    function _seekToFraction(fraction) {
      const vid = document.getElementById('preview-video');
      const aud = document.getElementById('preview-audio');
      const t = fraction * (vid.duration || 0);
      vid.currentTime = t;
      if (_previewHasAudio) aud.currentTime = t;
    }

    function progressClick(e) {
      const wrap = document.getElementById('preview-progress-wrap');
      const rect = wrap.getBoundingClientRect();
      _seekToFraction(Math.max(0, Math.min((e.clientX - rect.left) / rect.width, 1)));
    }

    function progressTouchStart(e) {
      _seekDragging = true;
      e.preventDefault();
      _progressTouchSeek(e);
    }
    function progressTouchMove(e) {
      if (!_seekDragging) return;
      e.preventDefault();
      _progressTouchSeek(e);
    }
    function progressTouchEnd() { _seekDragging = false; }
    function _progressTouchSeek(e) {
      const wrap = document.getElementById('preview-progress-wrap');
      const rect = wrap.getBoundingClientRect();
      const touch = e.touches[0];
      _seekToFraction(Math.max(0, Math.min((touch.clientX - rect.left) / rect.width, 1)));
    }

    function toggleMute() {
      const vid = document.getElementById('preview-video');
      const aud = document.getElementById('preview-audio');
      const target = _previewHasAudio ? aud : vid;
      target.muted = !target.muted;
      _updateVolIcon(target.muted);
    }

    function setVolume(val) {
      const vid = document.getElementById('preview-video');
      const aud = document.getElementById('preview-audio');
      const v = parseFloat(val);
      const target = _previewHasAudio ? aud : vid;
      target.volume = v;
      target.muted = (v === 0);
      _updateVolIcon(v === 0);
    }

    function setSpeed(val) {
      const vid = document.getElementById('preview-video');
      const aud = document.getElementById('preview-audio');
      const s = parseFloat(val);
      vid.playbackRate = s;
      if (_previewHasAudio) aud.playbackRate = s;
    }

    function _updatePlayIcon(playing) {
      document.getElementById('play-icon').style.display  = playing ? 'none' : '';
      document.getElementById('pause-icon').style.display = playing ? '' : 'none';
    }

    function _updateVolIcon(muted) {
      document.getElementById('vol-on-icon').style.display  = muted ? 'none' : '';
      document.getElementById('vol-off-icon').style.display = muted ? '' : 'none';
    }

    function _showPlayFlash(isPause) {
      const flash = document.getElementById('preview-play-flash');
      flash.innerHTML = isPause
        ? '<svg viewBox="0 0 24 24" fill="currentColor" width="54" height="54"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="currentColor" width="54" height="54"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
      flash.classList.remove('flash-anim');
      void flash.offsetWidth;
      flash.classList.add('flash-anim');
    }

    // Video element event wiring
    (function () {
      const vid = document.getElementById('preview-video');
      if (!vid) return;

      vid.addEventListener('timeupdate', () => {
        const dur = vid.duration || 0;
        const cur = vid.currentTime;
        const pct = dur > 0 ? (cur / dur * 100) : 0;
        document.getElementById('preview-progress-fill').style.width = pct + '%';
        document.getElementById('preview-progress-thumb').style.left = pct + '%';
        document.getElementById('preview-time-display').textContent =
          fmtDur(Math.floor(cur)) + ' / ' + fmtDur(Math.floor(dur));
        document.getElementById('preview-progress-wrap').setAttribute('aria-valuenow', Math.round(pct));
      });

      vid.addEventListener('play',   () => _updatePlayIcon(true));
      vid.addEventListener('pause',  () => _updatePlayIcon(false));
      vid.addEventListener('ended',  () => _updatePlayIcon(false));
      vid.addEventListener('waiting', () => {
        document.getElementById('preview-loading').style.display = 'flex';
      });
      vid.addEventListener('playing', () => {
        document.getElementById('preview-loading').style.display = 'none';
      });
      vid.addEventListener('canplay', () => {
        document.getElementById('preview-loading').style.display = 'none';
      });

      // Periodic audio-drift correction for dual-stream mode (only while modal open)
      setInterval(() => {
        if (!_previewHasAudio) return;
        if (document.getElementById('preview-modal').style.display === 'none') return;
        if (vid.paused) return;
        const aud = document.getElementById('preview-audio');
        if (Math.abs(vid.currentTime - aud.currentTime) > 0.4) {
          aud.currentTime = vid.currentTime;
        }
      }, 2000);
    }());

    // Keyboard shortcuts (active only when preview modal is open)
    document.addEventListener('keydown', e => {
      if (document.getElementById('preview-modal').style.display === 'none') return;
      // Don't override typing in inputs/selects
      if (['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;

      switch (e.key) {
        case ' ':
        case 'k':
          e.preventDefault();
          togglePlay();
          break;
        case 'Escape':
          closePreview();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          seekRel(-5);
          break;
        case 'ArrowRight':
          e.preventDefault();
          seekRel(5);
          break;
        case 'm':
        case 'M':
          toggleMute();
          break;
        case '>':
        case '.': {
          const sel = document.getElementById('preview-speed-select');
          if (sel.selectedIndex < sel.options.length - 1) {
            sel.selectedIndex++;
            setSpeed(sel.value);
          }
          break;
        }
        case '<':
        case ',': {
          const sel = document.getElementById('preview-speed-select');
          if (sel.selectedIndex > 0) {
            sel.selectedIndex--;
            setSpeed(sel.value);
          }
          break;
        }
      }
    });
  </script>
</body>
</html>
